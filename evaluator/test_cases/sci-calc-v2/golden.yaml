# Quantitative regression baseline for the sci-calc-v2 test case.
#
# Provenance: per-metric MEDIAN across 8 conforming claude-cli runs
# (contract pass-rate >= 95%) from the 10-run mvp stability batch on
# 2026-06-18, after the tech-env spec-pinning fix. The earlier baseline was
# derived from the now-removed claude-code SDK adapter (30 claude-code + 10
# kiro) and the pre-v2 doc taxonomy; this re-promotion tracks the current
# real-CLI terminal execution pattern (the /aidlc 32-stage workflow).
#
# golden-aidlc-docs/ was re-promoted from the richest conforming run of the
# same batch (90 design docs, all route-group functional designs); the
# qualitative scores below are the MEDIAN of three other conforming runs
# re-scored against that new golden (self-scoring the source run would
# inflate to ~1.0). Exact doc-pairing against the new golden is 100%.
#
# NOTE: execution token/wall-clock/handoff fields and artifact counts are
# intentionally 0. The terminal adapters do not emit per-turn token telemetry
# (those were Strands two-agent concepts), and the artifact collector inflates
# counts by walking .venv/node_modules inside run workspaces — both are
# excluded from regression comparison until the collectors are fixed.
# To re-promote from a single run instead: reporting.baseline.promote(run, path).
