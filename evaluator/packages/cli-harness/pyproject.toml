[project]
name = "aidlc-cli-harness"
version = "0.1.0"
description = "CLI-based harness for testing AIDLC workflows via kiro-cli"
requires-python = ">=3.13"
dependencies = [
    "pyyaml>=6.0",
    # PTY-backed terminal driver for the claude-cli adapter (drives the real
    # `claude` CLI like a customer): pexpect spawns in a real PTY, pyte renders
    # the screen grid for waiting on prompts/gates. POSIX-only.
    "pexpect>=4.9",
    "pyte>=0.8.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cli_harness"]

[tool.pytest.ini_options]
pythonpath = ["src"]
